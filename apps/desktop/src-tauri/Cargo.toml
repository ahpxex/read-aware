[package]
name = "read-aware-desktop"
version = "0.1.0"
description = "ReadAware desktop shell"
edition = "2021"
rust-version = "1.77.2"

[lib]
# The `_lib` suffix avoids a name collision with the binary on Windows.
name = "read_aware_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Bundled SQLite — no system dependency; compiles SQLite from source.
rusqlite = { version = "0.32", features = ["bundled"] }
