<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover lets the webview extend under notches / system bars
         on iOS and Android; the app pads itself with env(safe-area-inset-*)
         (see --ra-safe-* in src/index.css). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light dark" />
    <title>ReadAware</title>
    <meta
      name="description"
      content="AI-native reading workspace for context-rich EPUB and PDF reading."
    />
    <!-- Boot splash: pure inline CSS so it paints as soon as the document
         parses, before any JS loads. React replaces #root's children on mount.
         Colors mirror --color-paper / --color-fg in src/index.css.

         Theme: the desktop shell reads the persisted in-app preference from
         SQLite and stamps `data-theme` on <html> via an initialization script
         BEFORE the document parses (see lib.rs `boot_theme_script`), so a
         forced light/dark choice wins here. When nothing is stamped — the
         preference is "system", or this runs in the browser dev build — the
         prefers-color-scheme fallback follows the OS. The wordmark fades in
         after a short delay so a fast boot shows quiet paper, never a flash
         of text.

         The splash lives OUTSIDE #root as a topmost overlay: React mounts the
         app underneath it, then dismissBootSplash() (src/boot-splash.ts) adds
         .ra-splash-leave to dissolve it over the already-painted shelf — a
         cross-fade instead of a single-frame swap. -->
    <style>
      html {
        background: #f5f1e8;
      }
      #ra-splash {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f1e8;
        color: #1c1917;
        font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
        transition: opacity 260ms cubic-bezier(0.25, 1, 0.5, 1);
      }
      #ra-splash.ra-splash-leave {
        opacity: 0;
        pointer-events: none;
      }
      #ra-splash span {
        font-size: 1.75rem;
        letter-spacing: 0.01em;
        opacity: 0;
        animation: ra-splash-in 500ms ease 150ms forwards;
      }
      @keyframes ra-splash-in {
        to {
          opacity: 0.85;
        }
      }
      /* System preference (nothing stamped): follow the OS scheme. */
      @media (prefers-color-scheme: dark) {
        html:not([data-theme="light"]) {
          background: #1c1917;
        }
        html:not([data-theme="light"]) #ra-splash {
          background: #1c1917;
          color: #f5f5f4;
        }
      }
      /* Forced dark, stamped by the shell — wins regardless of OS scheme. */
      html[data-theme="dark"] {
        background: #1c1917;
      }
      html[data-theme="dark"] #ra-splash {
        background: #1c1917;
        color: #f5f5f4;
      }
      @media (prefers-reduced-motion: reduce) {
        #ra-splash span {
          animation: none;
          opacity: 0.85;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="ra-splash"><span>ReadAware</span></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
