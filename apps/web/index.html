<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>ReadAware</title>
    <meta
      name="description"
      content="AI-native reading workspace for context-rich EPUB and PDF reading."
    />
    <!-- Boot splash: pure inline CSS so it paints as soon as the document
         parses, before any JS loads. React replaces #root's children on mount.
         Colors mirror --color-paper / --color-fg in src/index.css; the theme
         follows the OS scheme here (the persisted in-app preference lives in
         SQLite and isn't readable pre-JS — a forced-opposite theme mismatches
         only for these first frames). The wordmark fades in after a short
         delay so a fast boot shows quiet paper, never a flash of text. -->
    <style>
      html {
        background: #f5f1e8;
      }
      #ra-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f1e8;
        color: #1c1917;
        font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
      }
      #ra-splash span {
        font-size: 1.75rem;
        letter-spacing: 0.01em;
        opacity: 0;
        animation: ra-splash-in 500ms ease 150ms forwards;
      }
      @keyframes ra-splash-in {
        to {
          opacity: 0.85;
        }
      }
      @media (prefers-color-scheme: dark) {
        html {
          background: #1c1917;
        }
        #ra-splash {
          background: #1c1917;
          color: #f5f5f4;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #ra-splash span {
          animation: none;
          opacity: 0.85;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="ra-splash"><span>ReadAware</span></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
